name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Determine version
        id: ver
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            VERSION="${VERSION}.0"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build
        run: |
          dotnet publish Jellyfin.Plugin.ContinueWatchingDedup/Jellyfin.Plugin.ContinueWatchingDedup.csproj \
            -c Release \
            -o dist \
            -p:Version=${{ steps.ver.outputs.version }} \
            -p:AssemblyVersion=${{ steps.ver.outputs.version }} \
            -p:FileVersion=${{ steps.ver.outputs.version }}

      - name: Package zip
        id: pkg
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          ZIP="continuewatchingdedup_${VERSION}.zip"
          mkdir -p artifacts
          cp dist/Jellyfin.Plugin.ContinueWatchingDedup.dll artifacts/
          cp build.yaml artifacts/ 2>/dev/null || true
          (cd artifacts && zip -r "../${ZIP}" .)
          CHECKSUM=$(md5sum "${ZIP}" | awk '{print $1}')
          echo "zip=${ZIP}" >> "$GITHUB_OUTPUT"
          echo "checksum=${CHECKSUM}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.tag }}
          generate_release_notes: true
          files: ${{ steps.pkg.outputs.zip }}

      - name: Stage manifest.json update against main
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          TAG: ${{ steps.ver.outputs.tag }}
          ZIP: ${{ steps.pkg.outputs.zip }}
          CHECKSUM: ${{ steps.pkg.outputs.checksum }}
        run: |
          # Tag builds run in detached HEAD on the tag commit; switch to a local main
          # tracking origin/main so the manifest update is computed against the latest
          # main, not the tag tree. peter-evans/create-pull-request will branch from
          # this checked-out HEAD and open a PR.
          git fetch origin main
          git checkout -B main origin/main

          python3 - <<'PY'
          import json, os
          from datetime import datetime, timezone
          path = "manifest.json"
          with open(path) as f:
              data = json.load(f)
          entry = data[0]
          entry.setdefault("versions", [])
          version = os.environ["VERSION"]
          tag = os.environ["TAG"]
          zip_name = os.environ["ZIP"]
          checksum = os.environ["CHECKSUM"]
          repo = os.environ["GITHUB_REPOSITORY"]
          timestamp = datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")
          entry["versions"] = [v for v in entry["versions"] if v.get("version") != version]
          entry["versions"].insert(0, {
              "version": version,
              "changelog": f"Release {tag}. See GitHub release notes.",
              "targetAbi": "10.10.0.0",
              "sourceUrl": f"https://github.com/{repo}/releases/download/{tag}/{zip_name}",
              "checksum": checksum,
              "timestamp": timestamp,
          })
          with open(path, "w") as f:
              json.dump(data, f, indent=2)
              f.write("\n")
          PY

      - name: Open PR with manifest update
        uses: peter-evans/create-pull-request@v6
        with:
          base: main
          branch: ci/manifest-${{ steps.ver.outputs.tag }}
          delete-branch: true
          commit-message: "ci: update manifest for ${{ steps.ver.outputs.tag }}"
          title: "ci: update manifest for ${{ steps.ver.outputs.tag }}"
          body: |
            Automated update from the release workflow for **${{ steps.ver.outputs.tag }}**.

            Adds version `${{ steps.ver.outputs.version }}` to `manifest.json` with
            the MD5 checksum of the release zip and the GitHub release `sourceUrl`.

            Merge to publish the new version through the Jellyfin plugin repository feed.
          labels: |
            automated
            release
